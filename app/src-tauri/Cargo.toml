[package]
name = "progno"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = "2.1"

[dependencies]
tauri = { version = "2.1", features = ["shell-open"] }
tauri-plugin-store = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
anyhow = "1.0"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
